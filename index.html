<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Water Quest</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <div class="container">
    <div class="brand-header">
  <img class="cw-logo" src="img/cw_logo_horizontal.png" alt="charity: water" />
  <h1>Water Quest</h1>
</div>
    <p class="game-instructions">Collect 20 items to complete the game!</p>
    <div class="stats">
      <p>Cans Collected: <span id="current-cans">0</span></p>
      <p>Time Left: <span id="timer">30</span>s</p>
    </div>
    <div class="difficulty">
  <p class="difficulty-label">Difficulty:</p>
  <label><input type="radio" name="difficulty" value="easy" checked> Easy</label>
  <label><input type="radio" name="difficulty" value="normal"> Normal</label>
  <label><input type="radio" name="difficulty" value="hard"> Hard</label>
</div>
    <div id="achievements" class="achievement"></div>
    <div class="game-grid"></div>
    <button id="start-game">Start Game</button>
    <footer class="cw-footer">
  <p>
    Learn more at
    <a href="https://www.charitywater.org/" target="_blank" rel="noopener noreferrer">charitywater.org</a>
    ·
    <a href="https://www.charitywater.org/donate" target="_blank" rel="noopener noreferrer">Donate</a>
  </p>
</footer>
  </div>
  <script src="script.js"></script>
</body>
</html>
